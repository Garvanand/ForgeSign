<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeSign | Contract Intelligence</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        critical: '#DC2626',
                        high: '#D97706',
                        medium: '#F59E0B',
                        standard: '#16A34A',
                        slate: {
                            850: '#1e293b',
                            900: '#0f172a'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .clause-card { transition: all 0.2s ease-in-out; }
        .clause-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .disclaimer { font-size: 0.75rem; color: #94a3b8; text-align: center; margin-top: 2rem; padding: 1rem; border-top: 1px solid #334155; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Mock Data for the UI
        const mockBrief = {
            title: "Salesforce MSA — 47 pages",
            governingLaw: "California, USA",
            term: "12 months, auto-renews",
            renewalDeadline: "December 15, 2025",
            daysAway: 67,
            exposure: {
                liability: "₹45L (3 months)",
                uncapped: "Data breach, IP"
            },
            counts: { critical: 2, high: 5, medium: 8, standard: 12 }
        };

        const mockClauses = [
            {
                id: 1,
                title: "Limitation of Liability",
                section: "§12",
                risk: "critical",
                plainEnglish: "Your maximum claim against Salesforce is capped at 3 months of fees you paid. Salesforce's claims against you: unlimited.",
                favorScore: 2,
                favorText: "Heavily favors Salesforce",
                scenarios: [
                    "Salesforce outage loses you ₹50L in sales, but you can only recover ₹45L.",
                    "A data breach exposes your customers, you face regulatory fines, but recovery is capped.",
                    "A critical feature you relied on is removed, stalling your ops, capped recovery."
                ],
                redline: "Each party's maximum aggregate liability shall not exceed the amounts paid or payable in the 12 months preceding the claim. Excludes gross negligence."
            },
            {
                id: 2,
                title: "Intellectual Property Assignment",
                section: "§8.4",
                risk: "high",
                plainEnglish: "Salesforce automatically owns any custom integrations you build on their platform, even if you paid to build them.",
                favorScore: 3,
                favorText: "Favors Salesforce",
                scenarios: [
                    "You build a proprietary workflow integration. Salesforce takes it and offers it to your competitors."
                ],
                redline: "Customer retains all right, title, and interest in its pre-existing IP and any custom integrations developed."
            }
        ];

        function App() {
            const [view, setView] = useState('upload'); // upload, analyzing, dashboard, redlines

            // Simulates the API delay
            const handleUpload = () => {
                setView('analyzing');
                setTimeout(() => setView('dashboard'), 3000);
            };

            const handleGenerateRedlines = () => {
                setView('redlines');
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-slate-850 border-b border-slate-800 p-4 flex justify-between items-center">
                        <div className="flex items-center space-x-2 cursor-pointer" onClick={() => setView('upload')}>
                            <div className="w-8 h-8 bg-blue-600 rounded flex items-center justify-center font-bold text-white">FS</div>
                            <h1 className="text-xl font-semibold tracking-tight text-white">ForgeSign</h1>
                        </div>
                        <div className="text-sm text-slate-400">AgentOS Contract Intelligence</div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 p-6 flex flex-col max-w-7xl mx-auto w-full">
                        {view === 'upload' && <UploadView onUpload={handleUpload} />}
                        {view === 'analyzing' && <AnalyzingView />}
                        {view === 'dashboard' && <DashboardView brief={mockBrief} clauses={mockClauses} onRedline={handleGenerateRedlines} />}
                        {view === 'redlines' && <RedlinesView onBack={() => setView('dashboard')} />}
                    </main>

                    {/* Mandatory Disclaimer */}
                    <footer className="disclaimer">
                        This analysis is for informational purposes only and does not constitute legal advice. For legally binding matters, consult a qualified advocate.
                    </footer>
                </div>
            );
        }

        function UploadView({ onUpload }) {
            return (
                <div className="flex flex-col items-center justify-center flex-1 space-y-8 mt-12">
                    <div className="text-center space-y-2">
                        <h2 className="text-3xl font-bold">Translate Legal to Practical.</h2>
                        <p className="text-slate-400 max-w-lg">Upload your contract to generate real-world risk scenarios, favorability scores, and native MS Word redlines.</p>
                    </div>

                    <div className="w-full max-w-2xl bg-slate-850 border-2 border-dashed border-slate-700 rounded-xl p-12 text-center hover:border-blue-500 transition-colors cursor-pointer">
                        <div className="mx-auto w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mb-4">
                            <i data-lucide="file-up" className="w-8 h-8 text-blue-400"></i>
                        </div>
                        <h3 className="text-xl font-medium mb-2">Drop your contract here</h3>
                        <p className="text-slate-400 text-sm mb-6">Accepts PDF, DOCX, or direct text paste</p>
                        
                        <div className="flex flex-col space-y-4 text-left max-w-sm mx-auto bg-slate-900 p-4 rounded-lg border border-slate-700">
                            <div>
                                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Contract Type</label>
                                <select className="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm text-white">
                                    <option>Auto-Detect</option>
                                    <option>SaaS MSA</option>
                                    <option>Freelance Agreement</option>
                                    <option>NDA</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Which party are you?</label>
                                <select className="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm text-white">
                                    <option>Client / Buyer</option>
                                    <option>Vendor / Provider</option>
                                </select>
                            </div>
                        </div>

                        <button onClick={onUpload} className="mt-8 bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 px-8 rounded-lg shadow-lg shadow-blue-500/20 transition-all">
                            Analyze Contract
                        </button>
                    </div>
                </div>
            );
        }

        function AnalyzingView() {
            return (
                <div className="flex flex-col items-center justify-center flex-1 space-y-6">
                    <div className="w-16 h-16 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin"></div>
                    <div className="text-center">
                        <h2 className="text-2xl font-bold mb-2">Analyzing 47 pages...</h2>
                        <p className="text-slate-400">Extracting clauses, mapping practical implications, simulating scenarios.</p>
                    </div>
                </div>
            );
        }

        function DashboardView({ brief, clauses, onRedline }) {
            return (
                <div className="flex flex-col md:flex-row gap-6 h-full">
                    {/* Left Panel: Briefing */}
                    <div className="w-full md:w-1/3 flex flex-col space-y-4">
                        <div className="bg-slate-850 rounded-xl border border-slate-700 overflow-hidden">
                            <div className="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center">
                                <h3 className="font-semibold text-white">Contract Brief</h3>
                                <button className="text-xs text-blue-400 hover:text-blue-300">Export PDF</button>
                            </div>
                            
                            <div className="p-5 space-y-6 text-sm">
                                <div>
                                    <div className="font-medium text-lg text-white mb-1">{brief.title}</div>
                                    <div className="text-slate-400">Law: {brief.governingLaw}</div>
                                    <div className="text-slate-400">Term: {brief.term}</div>
                                </div>

                                <div className="bg-red-900/20 border border-red-900/50 rounded-lg p-3">
                                    <div className="flex items-center text-red-400 font-semibold mb-1">
                                        <i data-lucide="alert-triangle" className="w-4 h-4 mr-2"></i>
                                        AUTO-RENEWAL DEADLINE
                                    </div>
                                    <div className="text-white">Cancel by: {brief.renewalDeadline}</div>
                                    <div className="text-red-300 text-xs mt-1">({brief.daysAway} days away)</div>
                                </div>

                                <div>
                                    <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Risk Overview</div>
                                    <div className="space-y-2">
                                        <div className="flex justify-between items-center"><span className="flex items-center text-critical"><span className="w-2 h-2 rounded-full bg-critical mr-2"></span>Critical</span><span className="font-medium">{brief.counts.critical}</span></div>
                                        <div className="flex justify-between items-center"><span className="flex items-center text-high"><span className="w-2 h-2 rounded-full bg-high mr-2"></span>High</span><span className="font-medium">{brief.counts.high}</span></div>
                                        <div className="flex justify-between items-center"><span className="flex items-center text-medium"><span className="w-2 h-2 rounded-full bg-medium mr-2"></span>Medium</span><span className="font-medium">{brief.counts.medium}</span></div>
                                        <div className="flex justify-between items-center"><span className="flex items-center text-standard"><span className="w-2 h-2 rounded-full bg-standard mr-2"></span>Standard</span><span className="font-medium">{brief.counts.standard}</span></div>
                                    </div>
                                </div>

                                <div>
                                    <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Your Exposure</div>
                                    <div className="text-slate-300"><span className="text-slate-500">Max Liability:</span> {brief.exposure.liability}</div>
                                    <div className="text-slate-300"><span className="text-slate-500">Uncapped:</span> {brief.exposure.uncapped}</div>
                                </div>
                            </div>
                        </div>

                        <button onClick={onRedline} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 rounded-lg shadow-lg shadow-blue-500/20 transition-all flex items-center justify-center">
                            <i data-lucide="file-edit" className="w-4 h-4 mr-2"></i> Generate DOCX Redlines
                        </button>
                    </div>

                    {/* Right Panel: Clause Cards */}
                    <div className="w-full md:w-2/3 flex flex-col space-y-4 overflow-y-auto pb-10">
                        <div className="flex justify-between items-end mb-2">
                            <h2 className="text-xl font-bold">Risk Analysis</h2>
                            <div className="text-sm text-slate-400">Sorted by Severity</div>
                        </div>

                        {clauses.map(clause => (
                            <ClauseCard key={clause.id} clause={clause} />
                        ))}
                    </div>
                </div>
            );
        }

        function ClauseCard({ clause }) {
            const [expanded, setExpanded] = useState(false);
            
            const getRiskColor = (risk) => {
                switch(risk) {
                    case 'critical': return 'text-critical bg-critical/10 border-critical/30';
                    case 'high': return 'text-high bg-high/10 border-high/30';
                    case 'medium': return 'text-medium bg-medium/10 border-medium/30';
                    default: return 'text-standard bg-standard/10 border-standard/30';
                }
            };

            const riskStyle = getRiskColor(clause.risk);

            return (
                <div className={`clause-card bg-slate-850 rounded-xl border border-slate-700 overflow-hidden`}>
                    <div className={`p-4 border-b flex justify-between items-center ${riskStyle}`}>
                        <div className="flex items-center font-bold uppercase tracking-wider text-sm">
                            {clause.risk === 'critical' && <span className="mr-2">🔴</span>}
                            {clause.risk === 'high' && <span className="mr-2">🟡</span>}
                            {clause.risk} RISK
                        </div>
                        <div className="text-slate-300 font-medium">{clause.section}</div>
                    </div>
                    
                    <div className="p-5 space-y-5">
                        <div className="flex justify-between items-start">
                            <h3 className="text-lg font-bold text-white">{clause.title}</h3>
                        </div>

                        <div>
                            <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Plain English</div>
                            <p className="text-slate-200 text-sm leading-relaxed">{clause.plainEnglish}</p>
                        </div>

                        <div>
                            <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Favor Analysis</div>
                            <div className="flex items-center space-x-3">
                                <div className="flex-1 h-2 bg-slate-700 rounded-full overflow-hidden flex">
                                    <div className="h-full bg-red-500" style={{width: `${(clause.favorScore/10)*100}%`}}></div>
                                </div>
                                <span className="text-sm font-medium text-slate-300">{clause.favorScore}/10</span>
                            </div>
                            <div className="text-xs text-slate-400 mt-1">{clause.favorText}</div>
                        </div>

                        <div className="border border-slate-700 rounded-lg overflow-hidden">
                            <button 
                                onClick={() => setExpanded(!expanded)} 
                                className="w-full bg-slate-800 p-3 flex justify-between items-center text-sm font-medium hover:bg-slate-700 transition-colors"
                            >
                                <span>Real-World Scenarios</span>
                                <span className="text-slate-400">{expanded ? '▲ Hide' : '▼ Expand'}</span>
                            </button>
                            {expanded && (
                                <div className="p-4 bg-slate-850 space-y-3">
                                    {clause.scenarios.map((scen, idx) => (
                                        <div key={idx} className="text-sm text-slate-300 flex">
                                            <span className="text-slate-500 mr-2">{idx+1}.</span>
                                            {scen}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="bg-slate-900 rounded-lg p-4 border border-slate-700">
                            <div className="text-xs font-semibold text-blue-400 uppercase tracking-wider mb-2">Redline Suggestion</div>
                            <p className="text-sm text-slate-300 italic font-serif border-l-2 border-blue-500 pl-3">"{clause.redline}"</p>
                        </div>

                        <div className="flex justify-end space-x-3 pt-2">
                            <button className="text-sm text-slate-400 hover:text-white px-3 py-2">Mark as Acceptable</button>
                            <button className="text-sm bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded border border-slate-600">See Full Redline</button>
                        </div>
                    </div>
                </div>
            );
        }

        function RedlinesView({ onBack }) {
            return (
                <div className="flex flex-col flex-1 space-y-6">
                    <div className="flex items-center space-x-4">
                        <button onClick={onBack} className="text-slate-400 hover:text-white">← Back to Dashboard</button>
                        <h2 className="text-2xl font-bold">Negotiation Playbook</h2>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="md:col-span-2 space-y-6">
                            <div className="bg-slate-850 border border-slate-700 rounded-xl p-8 text-center flex flex-col items-center justify-center">
                                <div className="w-16 h-16 bg-blue-900/30 rounded-full flex items-center justify-center mb-4">
                                    <span className="text-2xl">📝</span>
                                </div>
                                <h3 className="text-xl font-bold mb-2">Native Track Changes DOCX Generated</h3>
                                <p className="text-slate-400 mb-6 max-w-md">We've injected your approved redlines directly into the MS Word XML structure. The counterparty will see standard Word track changes.</p>
                                <button className="bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 px-8 rounded-lg shadow-lg flex items-center">
                                    <span className="mr-2">↓</span> Download Redlined DOCX
                                </button>
                            </div>

                            <div className="bg-slate-850 border border-slate-700 rounded-xl p-6">
                                <h3 className="font-bold text-lg mb-4">Redline Summary</h3>
                                <div className="flex space-x-4 mb-4">
                                    <div className="bg-slate-800 px-4 py-2 rounded-lg"><span className="text-2xl font-bold text-white">5</span> <span className="text-slate-400 text-sm">Total Edits</span></div>
                                    <div className="bg-slate-800 px-4 py-2 rounded-lg"><span className="text-2xl font-bold text-critical">2</span> <span className="text-slate-400 text-sm">Must-Haves</span></div>
                                    <div className="bg-slate-800 px-4 py-2 rounded-lg"><span className="text-2xl font-bold text-blue-400">3</span> <span className="text-slate-400 text-sm">Nice-to-Haves</span></div>
                                </div>
                            </div>
                        </div>

                        <div className="md:col-span-1">
                            <div className="bg-slate-850 border border-blue-900/50 rounded-xl overflow-hidden sticky top-6">
                                <div className="bg-blue-900/20 p-4 border-b border-blue-900/50">
                                    <h3 className="font-bold text-blue-400 flex items-center"><span className="mr-2">💡</span> Negotiation Coaching</h3>
                                </div>
                                <div className="p-5 space-y-4 text-sm text-slate-300">
                                    <p><strong className="text-white block mb-1">Opening Position</strong> Start with Section 12 (Liability). Say: "We love the agreement overall, but we need standard mutual caps on liability to proceed."</p>
                                    <p><strong className="text-white block mb-1">Trading Strategy</strong> If they push back on the IP assignment clause, offer to accept Net-60 payment terms in exchange.</p>
                                    <p><strong className="text-white block mb-1">Counterparty Profile</strong> Salesforce historically accepts liability changes only 2% of the time. Prepare for strong pushback. Frame it as a hard compliance requirement.</p>
                                    <button className="w-full mt-4 bg-slate-800 hover:bg-slate-700 text-white py-2 rounded border border-slate-600 flex items-center justify-center">
                                        <span className="mr-2">↓</span> Download Memo PDF
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Simple script to initialize lucide icons once React mounts
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
